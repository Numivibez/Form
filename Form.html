<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <section>
        <div class="form-container">
            <div class="form-side">
                <div class="form-header">
                    <img src="/img/numi-9.png" alt="Logo" class="logo" width="300px">
                </div>            
            </div>
            
            <div class="form-content">
                <form action="/submit" method="post">
                    <h3>Sign-Up</h3><br>
                    <label for="fname">First Name:</label>
                    <input type="text" id="fname" name="fname" placeholder="Jon" required><br><br>

                    <label for="lname">Last Name:</label>
                    <input type="text" id="lname" name="lname" placeholder="Doe" required><br><br>
                    
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="qwerty@gmail.com" required><br><br>

                    <label for="Phone">Phone number:</label>
                    <input type="tel" id="Phone" name="Phone" placeholder="080123456789" required><br><br>

                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required><br><br>
                    
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required><br><br>
                    
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
